name: Daily Regenerate

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.5/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full regeneration
        run: just all

      - name: Create pull request when changes exist
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: daily regenerate lexicons and Swift models"
          title: "chore: daily regenerate lexicons and Swift models"
          body: |
            Automated daily regeneration of lexicons and Swift model output.
          branch: "codex/daily-regenerate"
          delete-branch: true
