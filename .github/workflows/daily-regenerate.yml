name: Daily Regenerate

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      SWIFT_MODULE_CACHE_PATH: ${{ runner.temp }}/swift-module-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"

      - name: Compute Swift cache key
        id: swift-cache-key
        shell: bash
        run: |
          version="$(swift --version | head -n 1 | tr -cs '[:alnum:]._-' '-')"
          echo "key=${RUNNER_OS}-${version}-module-cache-v1" >> "$GITHUB_OUTPUT"

      - name: Restore Swift module cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SWIFT_MODULE_CACHE_PATH }}
          key: ${{ steps.swift-cache-key.outputs.key }}

      - name: Refresh lexicons
        run: sh ./scripts/get-lexicons.sh

      - name: Run full regeneration
        run: |
          go run ./cmd/lexicodegen ./lexicons --output ./output/swift
          bash ./scripts/check-swift-compile.sh ./output/swift

      - name: Create pull request when changes exist
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: daily regenerate lexicons and Swift models"
          title: "chore: daily regenerate lexicons and Swift models"
          body: |
            Automated daily regeneration of lexicons and Swift model output.
          branch: "codex/daily-regenerate"
          delete-branch: true
