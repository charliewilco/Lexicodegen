name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"

      - name: Run tests
        run: go test ./...

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Build executable
        run: go build -o ./lexicodegen ./cmd/lexicodegen

      - name: Generate Swift output from current lexicons
        run: ./lexicodegen ./lexicons --output ./output/swift

      - name: Verify generated Swift typechecks
        run: bash ./scripts/check-swift-compile.sh ./output/swift
