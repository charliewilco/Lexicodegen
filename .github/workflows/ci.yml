name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SWIFT_MODULE_CACHE_PATH: .swift-module-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2.4.0
        with:
          swift-version: "6.2"

      - name: Compute Swift cache key
        id: swift-cache-key
        shell: bash
        run: |
          version="$(swift --version | head -n 1 | tr -cs '[:alnum:]._-' '-')"
          echo "key=${RUNNER_OS}-${version}-module-cache-v1" >> "$GITHUB_OUTPUT"

      - name: Restore Swift module cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SWIFT_MODULE_CACHE_PATH }}
          key: ${{ steps.swift-cache-key.outputs.key }}

      - name: Run tests
        run: go test ./...

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Build executable
        run: go build -o ./lexicodegen ./cmd/lexicodegen

      - name: Generate Swift output from current lexicons
        run: ./lexicodegen ./lexicons --output ./output/swift

      - name: Verify generated Swift typechecks
        run: bash ./scripts/check-swift-compile.sh ./output/swift
