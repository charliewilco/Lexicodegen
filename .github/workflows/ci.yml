name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint and format check
        run: bunx biome check .

      - name: Run tests
        run: bun test

      - name: Build executable
        run: bun run build

      - name: Generate Swift output from current lexicons
        run: bun run generate

      - name: Verify generated Swift typechecks
        run: bun run check:swift
